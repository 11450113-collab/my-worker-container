# Cloudflare Durable Object Worker 設定
name = "my-worker-container"
main = "worker.js"
compatibility_date = "2024-04-01"

[durable_objects]
bindings = [
  { name = "TERMINAL", class_name = "Terminal" }
]

[[migrations]]
tag = "v1"
new_sqlite_classes = ["Terminal"]

# Durable Object 綁定，讓 class_name 與容器同步
[[durable_objects.bindings]]
name = "Terminal"
class_name = "Terminal"