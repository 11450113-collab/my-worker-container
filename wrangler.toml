name = "my-worker-container"
main = "worker.js"
compatibility_date = "2024-04-01"

[durable_objects]
bindings = [
  { name = "TERMINAL", class_name = "Terminal" }
]

[[migrations]]
tag = "v1"
new_sqlite_classes = ["Terminal"]

[[containers]]
class_name = "Terminal"
image = "ghcr.io/11450113-collab/my-worker-container:latest"
