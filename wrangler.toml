name = "my-worker-container"
main = "worker.js"
compatibility_date = "2024-04-01"

[[containers]]
max_instances = 10
class_name = "TerminalContainer"
# 明確指定為本地的 Dockerfile，Wrangler 會自動編譯並上傳
image = "./Dockerfile"

[[durable_objects.bindings]]
name = "TERMINAL_CONTAINER"
class_name = "TerminalContainer"

# 【必須】Cloudflare 強制規定：使用容器/Durable Object 必須初始化資料庫遷移
[[migrations]]
tag = "v2"
new_sqlite_classes = ["TerminalContainer"]
