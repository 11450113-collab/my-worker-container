name: Deploy to Cloudflare Workers Container

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Wrangler CLI
        run: npm install -g wrangler

      - name: Deploy to Cloudflare Workers
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          wrangler deploy 2>&1 || true
          echo "=== wrangler logs ==="
          cat /home/runner/.config/.wrangler/logs/*.log 2>/dev/null | grep -A 30 "ERROR\|Unauthorized\|401\|registry\|cloudflare" | head -100
