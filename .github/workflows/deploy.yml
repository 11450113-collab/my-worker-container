name: Deploy to Cloudflare Workers Container

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Docker Image
        run: |
          # 將倉庫名稱轉為小寫，避免 Docker 報錯
          REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          docker build --platform linux/amd64 -t ghcr.io/${REPO_LOWER}:latest .
          docker push ghcr.io/${REPO_LOWER}:latest

      - name: Install Wrangler CLI
        run: npm install -g wrangler

      - name: Print worker.js content
        run: cat worker.js

      - name: Wrangler dry-run entry check
        run: npx wrangler deploy --dry-run

      - name: Deploy to Cloudflare Workers Container
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: wrangler deploy