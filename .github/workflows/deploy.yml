name: Deploy to Cloudflare Workers Container

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Wrangler CLI and dependencies
        run: npm install -g wrangler && npm install

      - name: Authenticate with Cloudflare Registry
        run: |
          wrangler containers registries credentials --push --expiration-minutes 15 > /tmp/cf-registry-auth.json
          cat /tmp/cf-registry-auth.json | docker login registry.cloudflare.com -u _cloudflare_containers_token --password-stdin

      - name: Build and Push to Cloudflare Registry
        run: |
          docker build --platform linux/amd64 -t registry.cloudflare.com/f107bd5bc4bd453124ec014f2bb49a55/my-worker-container:latest .
          docker push registry.cloudflare.com/f107bd5bc4bd453124ec014f2bb49a55/my-worker-container:latest

      - name: Deploy to Cloudflare Workers
        run: wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
